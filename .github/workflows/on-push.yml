on: push

permissions: {}

jobs:
  on-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: |
          npm ci
      - run: |
          npm run check
